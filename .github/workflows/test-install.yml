name: Test Install Script

on:
  push:
    branches:
      - main
    paths:
      - install.sh
      - cmd/tntc/**
      - pkg/**
  pull_request:
    paths:
      - install.sh
      - cmd/tntc/**
      - pkg/**

jobs:
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: sh -n install.sh

  install:
    name: End-to-end install test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build tntc binary
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w \
              -X github.com/randybias/tentacular/pkg/version.Version=test \
              -X github.com/randybias/tentacular/pkg/version.Commit=$(git rev-parse --short HEAD) \
              -X github.com/randybias/tentacular/pkg/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o tntc_linux_amd64 \
            ./cmd/tntc

      - name: Set up mock release server
        run: |
          VERSION="v0.0.0-test"
          VERSION_CLEAN="${VERSION#v}"

          # Mock the GitHub Releases API response
          mkdir -p mock-releases/repos/${GITHUB_REPO}/releases
          echo "{\"tag_name\": \"${VERSION}\"}" > mock-releases/repos/${GITHUB_REPO}/releases/latest

          # Mock the tntc binary download
          mkdir -p mock-releases/${VERSION}
          cp tntc_linux_amd64 mock-releases/${VERSION}/tntc_linux_amd64

          # Mock the engine source tarball (archive/refs/tags/<version>.tar.gz)
          mkdir -p mock-releases/archive/refs/tags
          mkdir -p mock-tarball/tentacular-${VERSION_CLEAN}/engine
          cp -r engine/* mock-tarball/tentacular-${VERSION_CLEAN}/engine/
          tar -czf mock-releases/archive/refs/tags/${VERSION}.tar.gz \
            -C mock-tarball tentacular-${VERSION_CLEAN}

          cd mock-releases && python3 -m http.server 8888 &
          # Wait for server to be ready
          for i in $(seq 1 10); do
            curl -sf http://localhost:8888/repos/${GITHUB_REPO}/releases/latest && break
            sleep 1
          done
        env:
          GITHUB_REPO: randybias/tentacular

      - name: Patch and run install script
        run: |
          sed \
            -e 's|https://github.com/${GITHUB_REPO}/releases/download|http://localhost:8888|g' \
            -e 's|https://github.com/${GITHUB_REPO}/archive|http://localhost:8888/archive|g' \
            -e 's|https://api.github.com|http://localhost:8888|g' \
            install.sh > install-test.sh
          TNTC_INSTALL_DIR=$HOME/.local/bin sh install-test.sh

      - name: Verify binary
        run: $HOME/.local/bin/tntc version
